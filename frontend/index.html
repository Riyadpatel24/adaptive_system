<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Adaptive System Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }
    th {
      background: #020617;
    }
    .CRITICAL { color: #ef4444; }
    .DEGRADED { color: #f59e0b; }
    .HEALTHY { color: #22c55e; }
    .BLOCKED { color: #f97316; }
    .EXECUTED { color: #22c55e; }
    .COOLDOWN { color: #38bdf8; }
  </style>
</head>
<body>
  <h1>Adaptive System — Live Health</h1>
  <div id="system"></div>

  <table>
    <thead>
      <tr>
        <th>Entity</th>
        <th>Health</th>
        <th>Risk</th>
        <th>Trend</th>
        <th>Persistence</th>
        <th>Volatility</th>
        <th>Last Action</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="entities"></tbody>
  </table>

  <script>
    async function refresh() {
      const res = await fetch("http://localhost:8000/state");
      const data = await res.json();

      document.getElementById("system").innerText =
        `System Risk: ${data.system.risk} | Mode: ${data.system.mode}`;

      const tbody = document.getElementById("entities");
      tbody.innerHTML = "";

      for (const [id, e] of Object.entries(data.entities)) {
      const row = document.createElement("tr");

      const now = Date.now() / 1000;

      let status = e.action_status ?? "-";
      let statusClass = e.action_status ?? "";

      if (e.cooldown_until && e.cooldown_until > now) {
        status = "COOLDOWN";
        statusClass = "COOLDOWN";
      }

      row.innerHTML = `
        <td>${id}</td>
        <td class="${e.health}">${e.health}</td>
        <td>${e.risk}</td>
        <td>${e.trend}</td>
        <td>${e.persistence}</td>
        <td>${e.volatility}</td>
        <td>${e.last_action ?? "-"}</td>
        <td class="${statusClass}">
          ${status}
        </td>
      `;

      tbody.appendChild(row);
    }
    }

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
